services:
  n8n:
    build:
      context: ../..
      dockerfile: Dockerfile.n8n
    container_name: n8n-morphql-dev
    ports:
      - "5678:5678"
    environment:
      - N8N_LOG_LEVEL=debug
      - N8N_CUSTOM_EXTENSIONS=/opt/n8n-custom/n8n-nodes-morphql
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
